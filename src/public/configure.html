<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Racconmendations</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#060816;
  --card:rgba(17,22,37,.7);
  --card-2:rgba(25,32,52,.72);
  --stroke:rgba(255,255,255,.08);

  --text:#f4f7ff;
  --muted:#8994b2;

  --primary:#ffb347;
  --primary-2:#ff7b00;

  --success:#39d98a;
  --danger:#ff5d73;

  --blur:18px;
  --radius:28px;

  --shadow:
    0 10px 40px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.04);

  --gradient:
    linear-gradient(135deg,var(--primary),var(--primary-2));
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'Inter',sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left,#1c2340 0%,transparent 30%),
    radial-gradient(circle at bottom right,#2a143d 0%,transparent 30%),
    var(--bg);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

/* PARTICLES */

body::before,
body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}

body::before{
  background-image:
    radial-gradient(circle at 20% 20%,rgba(255,179,71,.15) 0 2px,transparent 3px),
    radial-gradient(circle at 80% 40%,rgba(255,255,255,.08) 0 1px,transparent 2px),
    radial-gradient(circle at 40% 80%,rgba(255,123,0,.12) 0 2px,transparent 3px);
  animation: floatParticles 18s linear infinite;
}

@keyframes floatParticles{
  from{
    transform:translateY(0);
  }
  to{
    transform:translateY(-80px);
  }
}

.container{
  width:min(1320px,92%);
  margin:auto;
  position:relative;
  z-index:2;
  padding:32px 0 80px;
}

/* HEADER */

.hero{
  position:relative;
  overflow:hidden;
  border-radius:40px;
  padding:60px 40px;
  background:
    linear-gradient(145deg,
      rgba(255,255,255,.04),
      rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(var(--blur));
  box-shadow:var(--shadow);
  margin-bottom:28px;
}

.hero::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle,rgba(255,179,71,.18),transparent 70%);
  top:-250px;
  right:-120px;
  animation:pulseGlow 6s ease-in-out infinite;
}

@keyframes pulseGlow{
  0%,100%{
    transform:scale(1);
    opacity:.6;
  }
  50%{
    transform:scale(1.15);
    opacity:1;
  }
}

.logo-row{
  display:flex;
  align-items:center;
  gap:18px;
  justify-content:center;
  margin-bottom:18px;
}

.logo{
  font-size:3rem;
  filter:drop-shadow(0 10px 20px rgba(255,179,71,.4));
  animation: bounce 3s ease-in-out infinite;
}

@keyframes bounce{
  0%,100%{
    transform:translateY(0);
  }
  50%{
    transform:translateY(-8px);
  }
}

h1{
  font-size:clamp(3rem,7vw,6rem);
  line-height:.9;
  letter-spacing:-3px;
  font-weight:900;

  background:linear-gradient(
    135deg,
    #fff 0%,
    #ffd59c 40%,
    #ff9d2f 100%
  );

  -webkit-background-clip:text;
  color:transparent;
}

.tagline{
  text-align:center;
  color:var(--muted);
  max-width:720px;
  margin:auto;
  line-height:1.7;
  font-size:1.05rem;
}

.hero-badge{
  width:max-content;
  margin:auto auto 24px;
  padding:10px 18px;
  border-radius:999px;
  background:rgba(255,179,71,.1);
  border:1px solid rgba(255,179,71,.2);
  color:#ffd59c;
  font-size:.85rem;
  backdrop-filter:blur(10px);
}

/* GLASS CARD */

.card{
  position:relative;
  overflow:hidden;
  background:var(--card);
  border:1px solid var(--stroke);
  border-radius:var(--radius);
  padding:28px;
  margin-bottom:24px;
  backdrop-filter:blur(var(--blur));
  box-shadow:var(--shadow);
  transition:.35s ease;
}

.card:hover{
  transform:translateY(-4px);
  border-color:rgba(255,179,71,.2);
}

.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.05),
      transparent 35%
    );
  pointer-events:none;
}

.card-title{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:1.25rem;
  font-weight:700;
  margin-bottom:20px;
}

.card-title .icon{
  width:44px;
  height:44px;
  display:grid;
  place-items:center;
  border-radius:14px;
  background:rgba(255,179,71,.12);
  border:1px solid rgba(255,179,71,.18);
  font-size:1.2rem;
}

/* INPUTS */

.input-group{
  display:flex;
  flex-direction:column;
  gap:14px;
}

input,
textarea{
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  color:var(--text);
  border-radius:18px;
  padding:18px 20px;
  font-size:.95rem;
  transition:.25s ease;
}

input:focus,
textarea:focus{
  outline:none;
  border-color:rgba(255,179,71,.5);
  box-shadow:
    0 0 0 4px rgba(255,179,71,.08),
    0 10px 30px rgba(255,179,71,.08);
  transform:translateY(-1px);
}

input::placeholder,
textarea::placeholder{
  color:#66718f;
}

/* BUTTONS */

.btn{
  border:none;
  cursor:pointer;
  transition:.25s ease;
  font-family:inherit;
  font-weight:700;
}

.btn-primary{
  width:100%;
  border-radius:22px;
  padding:18px 24px;
  background:var(--gradient);
  color:#111;
  font-size:1rem;
  position:relative;
  overflow:hidden;
}

.btn-primary::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.45),
    transparent
  );
  transform:translateX(-120%);
}

.btn-primary:hover::before{
  transition:1s;
  transform:translateX(120%);
}

.btn-primary:hover{
  transform:translateY(-2px) scale(1.01);
  box-shadow:
    0 15px 35px rgba(255,123,0,.35);
}

.btn-secondary{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  color:var(--text);
  padding:10px 16px;
  border-radius:14px;
}

.btn-secondary:hover{
  background:rgba(255,255,255,.08);
}

/* LANGUAGE */

.language-selector{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.lang-btn{
  border:none;
  cursor:pointer;
  padding:12px 18px;
  border-radius:999px;
  background:rgba(255,255,255,.04);
  color:var(--text);
  border:1px solid rgba(255,255,255,.08);
  transition:.25s ease;
}

.lang-btn:hover{
  transform:translateY(-2px);
}

.lang-btn.active{
  background:var(--gradient);
  color:#111;
  border-color:transparent;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:18px;
}

.grid-card{
  position:relative;
  overflow:hidden;
  border-radius:22px;
  background:var(--card-2);
  border:1px solid rgba(255,255,255,.06);
  transition:.3s ease;
  cursor:pointer;
}

.grid-card:hover{
  transform:
    translateY(-8px)
    scale(1.03);

  box-shadow:
    0 20px 40px rgba(0,0,0,.45);
}

.grid-card.selected{
  border-color:rgba(255,179,71,.7);
  box-shadow:
    0 0 0 2px rgba(255,179,71,.3),
    0 20px 50px rgba(255,123,0,.2);
}

.grid-card img{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
  display:block;
}

.grid-card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to top,
    rgba(0,0,0,.7),
    transparent 50%
  );
}

.title{
  position:absolute;
  left:12px;
  right:12px;
  bottom:12px;
  z-index:2;
  font-size:.8rem;
  font-weight:600;
  line-height:1.3;
}

/* STATUS */

.status{
  margin-top:16px;
  border-radius:18px;
  padding:14px 18px;
  font-size:.92rem;
  backdrop-filter:blur(10px);
}

.success{
  background:rgba(57,217,138,.12);
  border:1px solid rgba(57,217,138,.3);
}

.error{
  background:rgba(255,93,115,.12);
  border:1px solid rgba(255,93,115,.3);
}

/* RESULT */

.result{
  margin-top:30px;
  padding:36px;
  border-radius:32px;
  text-align:center;
  background:
    linear-gradient(
      145deg,
      rgba(255,179,71,.12),
      rgba(255,123,0,.08)
    );
  border:1px solid rgba(255,179,71,.2);
  backdrop-filter:blur(20px);
}

.install-link{
  margin:22px 0;
  background:#0c1020;
  border-radius:18px;
  padding:20px;
  font-family:monospace;
  border:1px solid rgba(255,255,255,.08);
  color:#ffd59c;
  word-break:break-all;
}

/* TOAST */

.toast-container{
  position:fixed;
  right:20px;
  bottom:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:9999;
}

.toast{
  min-width:260px;
  background:rgba(15,20,35,.92);
  border:1px solid rgba(255,255,255,.08);
  border-left:4px solid var(--primary);
  padding:16px;
  border-radius:18px;
  backdrop-filter:blur(16px);

  animation:
    toastIn .35s ease,
    toastFloat 4s ease infinite;
}

@keyframes toastIn{
  from{
    transform:translateX(120%);
    opacity:0;
  }
  to{
    transform:translateX(0);
    opacity:1;
  }
}

@keyframes toastFloat{
  0%,100%{
    transform:translateY(0);
  }
  50%{
    transform:translateY(-3px);
  }
}

/* BADGES */

.count-badge{
  padding:6px 12px;
  border-radius:999px;
  background:rgba(255,179,71,.14);
  border:1px solid rgba(255,179,71,.2);
  color:#ffd59c;
  font-size:.75rem;
}

/* FLEX */

.flex-between{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
}

/* FOOTER */

.footer{
  margin-top:50px;
  text-align:center;
  color:#66718f;
  font-size:.85rem;
}

/* RESPONSIVE */

@media(max-width:768px){

  .hero{
    padding:42px 22px;
  }

  h1{
    font-size:3rem;
  }

  .grid{
    grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  }

  .card{
    padding:20px;
  }

}
</style>
</head>

<body>

<div class="container">

  <section class="hero">

    <div class="hero-badge">
      ✨ AI-powered movie discovery
    </div>

    <div class="logo-row">
      <div class="logo">🦝</div>
      <h1>Racconmendations</h1>
      <div class="logo">🎬</div>
    </div>

    <p class="tagline">
      Connect your Stremio library, pick the stuff you actually love,
      and let the raccoon build a recommendation engine around your taste.
    </p>

  </section>

  <!-- LOGIN -->

  <div class="card">

    <div class="card-title">
      <div class="icon">🔐</div>
      Connect your Stremio account
    </div>

    <div class="input-group">

      <input
        type="email"
        id="email"
        placeholder="Enter your Stremio email"
      >

      <input
        type="password"
        id="password"
        placeholder="Enter your password"
      >

      <button id="loginBtn" class="btn btn-primary">
        🦝 Import My Library
      </button>

    </div>

    <div id="loginStatus"></div>

  </div>

</div>

<div class="toast-container" id="toastContainer"></div>

<script>
function showToast(message){

  const container = document.getElementById("toastContainer");

  const toast = document.createElement("div");

  toast.className = "toast";
  toast.innerHTML = message;

  container.appendChild(toast);

  setTimeout(()=>{
    toast.remove();
  },3000);

}

/* micro interactions */

document.querySelectorAll(".btn").forEach(btn=>{

  btn.addEventListener("mousemove",(e)=>{

    const rect = btn.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    btn.style.setProperty("--x",x + "px");
    btn.style.setProperty("--y",y + "px");

  });

});

/* fake demo */

document.getElementById("loginBtn").onclick = ()=>{

  const btn = document.getElementById("loginBtn");

  btn.innerHTML = "Importing Library...";

  btn.disabled = true;

  setTimeout(()=>{

    document.getElementById("loginStatus").innerHTML = `
      <div class="status success">
        ✅ Library imported successfully.<br><br>
        148 Movies • 62 Series • Taste profile generated
      </div>
    `;

    showToast("Library synced successfully ✨");

    btn.innerHTML = "🦝 Library Imported";
  },1800);

}
</script>

</body>
</html>
